name: Sync Upstream

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'Nitmi/lofi-radio-web'
    runs-on: ubuntu-latest
    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge upstream main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/88lin/lofi-radio-web.git
          git fetch upstream main

          if git merge-base --is-ancestor upstream/main HEAD; then
            last_commit_at=$(git log -1 --format=%ct)
            now=$(date +%s)

            if (( now - last_commit_at < 2592000 )); then
              echo "Fork is already up to date."
              exit 0
            fi

            git commit --allow-empty -m "chore: keep upstream sync active"
            git push origin HEAD:main
            exit 0
          fi

          git merge --no-edit upstream/main
          git push origin HEAD:main
